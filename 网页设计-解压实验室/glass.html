<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>砸玻璃 · 情绪解压</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0a0a1a;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            color: #e0e0e0;
            letter-spacing: 0.5px;
            user-select: none;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

        nav {
            flex-shrink: 0;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
            z-index: 100;
        }
        nav a {
            text-decoration: none;
            color: #ccc;
            font-weight: 500;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        nav a:hover, nav a.active {
            background: rgba(255,255,255,0.15);
            color: #fff;
            box-shadow: 0 2px 15px rgba(0,0,0,0.3);
        }

        .container {
            flex: 1;
            position: relative;
            overflow: hidden;
            /* 锤子光标：48x48，锤头在上，手柄在下，热点在锤头中心 */
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='48' height='48' viewBox='0 0 48 48'><rect x='6' y='4' width='36' height='18' rx='4' fill='%23aaaaaa' stroke='%23555555' stroke-width='3'/><rect x='18' y='22' width='12' height='24' rx='3' fill='%238B7355' stroke='%235D4037' stroke-width='3'/></svg>") 24 13, crosshair;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        .hint-text {
            font-size: 2rem;
            font-weight: 700;
            color: rgba(255,255,255,0.8);
            text-shadow: 0 0 20px rgba(0,0,0,0.6);
            animation: pulse 1.5s infinite;
            margin-bottom: 0.5rem;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.05); }
        }
        .again-btn {
            pointer-events: auto;
            margin-top: 1rem;
            padding: 0.8rem 2.5rem;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.4);
            color: #fff;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
            display: none;
        }
        .again-btn:hover {
            background: rgba(255,255,255,0.35);
            transform: scale(1.05);
        }
        .counter {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            color: #fff;
            font-size: 1rem;
            pointer-events: none;
        }
        footer {
            flex-shrink: 0;
            text-align: center;
            padding: 0.8rem;
            color: rgba(255,255,255,0.3);
            font-size: 0.8rem;
            background: rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">🏠 首页</a>
        <a href="bubble.html">🫧 泡泡纸</a>
        <a href="scarecrow.html">🎯 飞镖稻草人</a>
        <a href="shredder.html">💥 粉碎机</a>
        <a href="glass.html" class="active">🔨 砸玻璃</a>
    </nav>

    <div class="container" id="container">
        <canvas id="glassCanvas"></canvas>
        <div class="overlay" id="overlay">
            <div class="hint-text" id="hintText">砸碎烦恼，从这里开始</div>
            <button class="again-btn" id="againBtn" onclick="resetGlass()">再来一次</button>
        </div>
        <div class="counter" id="counter">点击玻璃，用力砸！</div>
    </div>

    <footer>© 2026 情绪解压实验室 · 课程设计作品</footer>

    <script>
        const canvas = document.getElementById('glassCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('container');
        const hintText = document.getElementById('hintText');
        const againBtn = document.getElementById('againBtn');
        const counterEl = document.getElementById('counter');

        let W, H;
        let cracks = [];
        let shards = [];
        let glassBroken = false;
        const requiredClicks = 10;
        let clickCount = 0;

        let bgGradient;

        function resize() {
            W = container.clientWidth;
            H = container.clientHeight;
            canvas.width = W;
            canvas.height = H;
            bgGradient = ctx.createLinearGradient(0, 0, W, H);
            bgGradient.addColorStop(0, '#a1c4fd');
            bgGradient.addColorStop(1, '#c2e9fb');
        }
        window.addEventListener('resize', resize);
        resize();

        function playSound(type) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const now = audioCtx.currentTime;
                if (type === 'crack') {
                    const bufferSize = audioCtx.sampleRate * 0.12;
                    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 3);
                    }
                    const source = audioCtx.createBufferSource();
                    source.buffer = buffer;
                    const gain = audioCtx.createGain();
                    gain.gain.setValueAtTime(0.35, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
                    source.connect(gain);
                    gain.connect(audioCtx.destination);
                    source.start();
                } else if (type === 'shatter') {
                    const bufferSize = audioCtx.sampleRate * 0.5;
                    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 1.8);
                    }
                    const source = audioCtx.createBufferSource();
                    source.buffer = buffer;
                    const gain = audioCtx.createGain();
                    gain.gain.setValueAtTime(0.7, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                    source.connect(gain);
                    gain.connect(audioCtx.destination);
                    source.start();
                }
            } catch(e) {}
        }

        function addCrack(x, y) {
            const points = [{ x, y }];
            let currentX = x;
            let currentY = y;
            const segments = 5 + Math.floor(Math.random() * 7);
            for (let i = 0; i < segments; i++) {
                const angle = Math.random() * Math.PI * 2;
                const length = 40 + Math.random() * 100;
                currentX += Math.cos(angle) * length;
                currentY += Math.sin(angle) * length;
                currentX = Math.max(5, Math.min(W - 5, currentX));
                currentY = Math.max(5, Math.min(H - 5, currentY));
                points.push({ x: currentX, y: currentY });
            }
            cracks.push({ points });
        }

        function handleClick(e) {
            if (glassBroken) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            clickCount++;
            addCrack(x, y);
            playSound('crack');
            hintText.style.display = 'none';
            if (clickCount >= requiredClicks) {
                shatterGlass();
            } else {
                counterEl.textContent = `再砸 ${requiredClicks - clickCount} 次玻璃就碎了！`;
            }
        }

        function shatterGlass() {
            glassBroken = true;
            playSound('shatter');
            counterEl.textContent = '';
            hintText.style.display = 'none';
            againBtn.style.display = 'inline-block';
            againBtn.textContent = '再来一次';

            const gridSize = 50;
            for (let x = 0; x < W; x += gridSize) {
                for (let y = 0; y < H; y += gridSize) {
                    const size = gridSize + (Math.random() - 0.5) * 20;
                    shards.push({
                        x: x + gridSize / 2,
                        y: y + gridSize / 2,
                        vx: (Math.random() - 0.5) * 5,
                        vy: (Math.random() - 0.5) * 5 - 2,
                        rotation: (Math.random() - 0.5) * 0.8,
                        size: size,
                        opacity: 1,
                        color: `rgba(200, 220, 240, ${0.6 + Math.random() * 0.4})`
                    });
                }
            }
        }

        function resetGlass() {
            cracks = [];
            shards = [];
            glassBroken = false;
            clickCount = 0;
            counterEl.textContent = '点击玻璃，用力砸！';
            hintText.style.display = 'block';
            againBtn.style.display = 'none';
        }

        function drawBackground() {
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            for (let i = 0; i < 4; i++) {
                const cx = Math.random() * W;
                const cy = Math.random() * H * 0.4;
                ctx.beginPath();
                ctx.arc(cx, cy, 30 + Math.random() * 40, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 2.5rem "PingFang SC", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('一切都会好起来的', W/2, H*0.75);
        }

        function drawCracks() {
            cracks.forEach(crack => {
                ctx.beginPath();
                ctx.moveTo(crack.points[0].x, crack.points[0].y);
                for (let i = 1; i < crack.points.length; i++) {
                    ctx.lineTo(crack.points[i].x, crack.points[i].y);
                }
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 4;
                ctx.shadowColor = 'rgba(0,0,0,0.7)';
                ctx.shadowBlur = 6;
                ctx.stroke();
                ctx.strokeStyle = 'rgba(255,255,255,0.9)';
                ctx.lineWidth = 1.5;
                ctx.shadowBlur = 0;
                ctx.stroke();
            });
        }

        function drawShards() {
            shards.forEach(s => {
                ctx.save();
                ctx.translate(s.x, s.y);
                ctx.rotate(s.rotation);
                ctx.fillStyle = s.color;
                ctx.fillRect(-s.size/2, -s.size/2, s.size, s.size);
                ctx.restore();
            });
        }

        function animate() {
            ctx.clearRect(0, 0, W, H);
            if (glassBroken) {
                drawBackground();
                shards.forEach(s => {
                    s.x += s.vx;
                    s.y += s.vy;
                    s.vy += 0.08;
                    s.opacity -= 0.005;
                });
                shards = shards.filter(s => s.opacity > 0);
                drawShards();
            } else {
                ctx.fillStyle = 'rgba(100, 110, 120, 0.65)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = 'rgba(255,255,255,0.12)';
                ctx.beginPath();
                ctx.ellipse(W*0.3, H*0.15, W*0.35, H*0.1, 0, 0, Math.PI*2);
                ctx.fill();
                drawCracks();
            }
            requestAnimationFrame(animate);
        }

        container.addEventListener('click', handleClick);
        window.resetGlass = resetGlass;
        animate();
    </script>
</body>
</html>
